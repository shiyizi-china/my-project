 spring:
    cloud:
      alicloud:
        oss:
          endpoint: https://oss-cn-guangzhou.aliyuncs.com
          bucket-name: home-pageimage
          region: cn-guangzhou
    datasource:
      url: jdbc:${MYSQL_URL}
      username: ${MYSQLUSER}
      password: ${MYSQLPASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
