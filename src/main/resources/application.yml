spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never  # 这里必须是 never！关闭自动执行SQL！
  cloud:
    alicloud:
      oss:
        endpoint: https://oss-cn-guangzhou.aliyuncs.com
        bucket-name: home-pageimage
        region: cn-guangzhou

mybatis:
  type-aliases-package: org.shiyizi.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB
